version: '3.8'

services:
  # PostgreSQL Database (Required)
  postgres:
    image: postgres:15-alpine
    container_name: repcon_db
    environment:
      POSTGRES_USER: repcon
      POSTGRES_PASSWORD: repcon123
      POSTGRES_DB: repcon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repcon"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Required)
  redis:
    image: redis:7-alpine
    container_name: repcon_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repcon_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://repcon:repcon123@postgres:5432/repcon
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LOCAL_ONLY=true
      - SECRET_KEY=dev-secret-key
      - JWT_SECRET=dev-jwt-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: repcon_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: repcon_network
